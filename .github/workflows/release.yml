name: Release

on:
  push:
    tags:
      - "v*"

# 同一 tag 重复触发时只保留最新一次
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    runs-on: windows-latest
    name: Release (Windows x64)

    permissions:
      contents: write    # 创建 GitHub Release 需要写权限
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download fonts
        run: bun run download-fonts

      - name: Build daemon JS
        run: bun run build:daemon

      - name: Build and publish to GitHub Releases
        run: bun run build:daemon && npx electron-vite build && npx electron-builder --win --x64 --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_PORT: 5173

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*/AgentDock-Setup-*.exe
            release/*/AgentDock-Setup-*.exe.blockmap
            release/*/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
